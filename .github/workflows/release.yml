name: Build Wheels and Release

on:
  push:
    branches: [main]
    tags: ["pygraphviz-*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GRAPHVIZ_VERSION: "12.2.1"

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15
          - macos-15-intel
          - windows-latest
          - ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      # --- Windows: install graphviz + rebuild gvplugin_gdiplus with the text
      #     vertical-centering fix. Done here (not in CIBW_BEFORE_ALL_WINDOWS)
      #     because rebuilding the plugin needs the MSVC toolchain on PATH. ---
      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Graphviz on Windows (install + patch gdiplus text centering)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ver  = "${{ env.GRAPHVIZ_VERSION }}"
          $base = "https://gitlab.com/api/v4/projects/4207231/packages/generic/graphviz-releases/$ver"

          Write-Host "Installing official graphviz $ver to C:\graphviz"
          curl.exe -L --retry 3 -o "$env:TEMP\graphviz.exe" "$base/windows_10_cmake_Release_graphviz-install-$ver-win64.exe"
          Start-Process -Wait -FilePath "$env:TEMP\graphviz.exe" -ArgumentList "/S","/D=C:\graphviz"

          Write-Host "Fetching graphviz source to rebuild the gdiplus plugin"
          curl.exe -L --retry 3 -o "$env:TEMP\gv.tar.gz" "$base/graphviz-$ver.tar.gz"
          tar -xzf "$env:TEMP\gv.tar.gz" -C "$env:TEMP"
          $src = "$env:TEMP\graphviz-$ver"

          # NOTE: GDI+ text vertical-centering patch is intentionally NOT applied
          # in this run. Earlier render tests were measuring the runner's
          # *official* graphviz (demand-loaded from C:\graphviz), not the wheel's
          # bundled gdiplus builtin -- the render step now sets GVBINDIR to force
          # the builtins path, so this run measures STOCK gdiplus as a clean
          # baseline. The centering fix (and its exact constant) will be applied
          # once that baseline is known.

          # The plugin's only config.h dependency is the GVDLL macro, which we
          # pass via /DGVDLL; an empty config.h satisfies the #include.
          New-Item -ItemType File -Force -Path "$src\config.h" | Out-Null

          Push-Location $src
          Write-Host "Compiling patched gvplugin_gdiplus.dll against the installed import libs"
          cl /nologo /LD /EHsc /O2 /DNDEBUG /DGVDLL `
             /I. /Ilib /Ilib\common /Ilib\pathplan /Ilib\gvc /Ilib\cgraph /Ilib\cdt /Iplugin\gdiplus `
             plugin\gdiplus\gvdevice_gdiplus.cpp plugin\gdiplus\gvloadimage_gdiplus.cpp `
             plugin\gdiplus\gvplugin_gdiplus.cpp plugin\gdiplus\gvrender_gdiplus.cpp `
             plugin\gdiplus\gvtextlayout_gdiplus.cpp `
             /Fe:gvplugin_gdiplus.dll `
             /link C:\graphviz\lib\gvc.lib C:\graphviz\lib\cgraph.lib C:\graphviz\lib\cdt.lib `
                   gdi32.lib user32.lib ole32.lib uuid.lib gdiplus.lib
          if ($LASTEXITCODE -ne 0) { throw "cl build of gvplugin_gdiplus failed" }

          Copy-Item -Force gvplugin_gdiplus.dll C:\graphviz\bin\gvplugin_gdiplus.dll
          Copy-Item -Force gvplugin_gdiplus.lib C:\graphviz\lib\gvplugin_gdiplus.lib
          Pop-Location
          Write-Host "Patched plugin installed:"
          Get-Item C:\graphviz\bin\gvplugin_gdiplus.dll | Format-List Name,Length,LastWriteTime

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux_*"

          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28

          # --- Build graphviz from source (autotools) on Linux/macOS ---
          # The release tarballs use autotools, not CMake.
          # --disable-swig --disable-tcl etc: skip language bindings we don't need
          # CFLAGS=-fPIC: needed for linking into a shared Python extension
          CIBW_BEFORE_ALL_LINUX: >
            dnf install -y gcc gcc-c++ bison flex expat-devel zlib-devel autoconf automake libtool gd-devel cairo-devel pango-devel &&
            curl -L
            "https://gitlab.com/api/v4/projects/4207231/packages/generic/graphviz-releases/${{ env.GRAPHVIZ_VERSION }}/graphviz-${{ env.GRAPHVIZ_VERSION }}.tar.gz"
            -o /tmp/graphviz.tar.gz &&
            tar xzf /tmp/graphviz.tar.gz -C /tmp &&
            cd /tmp/graphviz-${{ env.GRAPHVIZ_VERSION }} &&
            ./configure
            --prefix=/opt/graphviz
            --with-pangocairo
            --disable-swig
            --disable-tcl
            --disable-sharp
            --disable-go
            --disable-guile
            --disable-java
            --disable-lua
            --disable-perl
            --disable-php
            --disable-python
            --disable-python3
            --disable-r
            --disable-ruby
            --disable-man-pdfs
            --with-expat
            --with-zlib
            CFLAGS="-fPIC" &&
            make -j$(nproc) &&
            make install &&
            ldconfig

          # macOS: build only libtool/libltdl + graphviz from source into
          # GRAPHVIZ_PREFIX. The native Quartz renderer (gvplugin_quartz,
          # CoreText/CoreGraphics) provides anti-aliased png/pdf/jpg/gif/tiff
          # output, so libgd is NOT built (--with-libgd=no) and its image deps
          # (libpng, freetype) are dropped -- a much smaller, faster build.
          #
          # WHY build from source at all: Homebrew bottles target the runner's
          # current macOS (15), so delocate >= 0.11 refuses to bundle them into
          # a wheel tagged for our 11.0 floor; source builds carry the wheel's
          # deployment target. ApplicationServices is a system framework (always
          # present, never bundled), so Quartz adds no bundled runtime deps.
          # System libs (zlib, expat) come from the SDK and are not bundled.
          #
          # BEFORE_ALL runs once per job (per arch).
          CIBW_BEFORE_ALL_MACOS: |
            set -eux

            export MACOSX_DEPLOYMENT_TARGET=11.0
            PREFIX=/opt/graphviz
            JOBS="$(sysctl -n hw.logicalcpu)"

            LIBTOOL_VERSION=2.5.4

            # Own the prefix so every `make install` works without sudo.
            sudo mkdir -p "$PREFIX"
            sudo chown -R "$(id -u):$(id -g)" "$PREFIX"

            export PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig"
            export PATH="$PREFIX/bin:$PATH"

            dl() { curl -fSL --retry 3 --retry-delay 5 "$1" -o "$2"; }
            cd /tmp

            # libtool / libltdl (graphviz links libltdl for plugin loading).
            # The runner's Homebrew libtool bottle targets the current macOS
            # (15), so delocate rejects it in an 11.0 wheel. Build from source
            # so the bundled copy carries the 11.0 floor, and point graphviz's
            # configure at it below.
            dl "https://ftpmirror.gnu.org/libtool/libtool-${LIBTOOL_VERSION}.tar.gz" libtool.tar.gz
            tar xzf libtool.tar.gz
            ( cd "libtool-${LIBTOOL_VERSION}" \
              && ./configure --prefix="$PREFIX" --disable-static \
              && make -j"$JOBS" && make install )

            # graphviz with the native Quartz renderer and no gd:
            #   --with-quartz=yes  builds gvplugin_quartz (NOT default in the
            #     autotools build); QUARTZ_LIBS points the link at the
            #     ApplicationServices framework.
            #   --with-libgd=no    skips the gd plugin AND stops configure from
            #     auto-detecting a stray Homebrew libgd on the runner (which
            #     would target macOS 15 and break the 11.0 floor).
            # CPPFLAGS/LDFLAGS steer ltdl detection to our 11.0 libltdl in $PREFIX.
            dl "https://gitlab.com/api/v4/projects/4207231/packages/generic/graphviz-releases/${{ env.GRAPHVIZ_VERSION }}/graphviz-${{ env.GRAPHVIZ_VERSION }}.tar.gz" graphviz.tar.gz
            tar xzf graphviz.tar.gz
            cd "graphviz-${{ env.GRAPHVIZ_VERSION }}"
            CPPFLAGS="-I$PREFIX/include" LDFLAGS="-L$PREFIX/lib" \
            ./configure \
              --prefix="$PREFIX" \
              --with-quartz=yes QUARTZ_LIBS="-framework ApplicationServices" \
              --with-libgd=no \
              --disable-swig --disable-tcl --disable-sharp --disable-go --disable-guile \
              --disable-java --disable-lua --disable-perl --disable-php \
              --disable-python --disable-python3 --disable-r --disable-ruby \
              --disable-man-pdfs --with-expat --with-zlib
            # graphviz 12.2.1's plugin/quartz/Makefile.am sets
            # libgvplugin_quartz_la_LIBADD = $(QUARTZ_LIBS) only, leaving gvc/
            # cgraph symbols (gvwrite, agnameof, gvusershape_*) undefined in the
            # plugin dylib. Older linkers allowed that in a -module bundle; the
            # Xcode 16 ld does not, so the link fails. The core plugin links
            # these libs explicitly -- give quartz the same so it links cleanly.
            echo 'libgvplugin_quartz_la_LIBADD += $(top_builddir)/lib/gvc/libgvc.la $(top_builddir)/lib/cgraph/libcgraph.la $(top_builddir)/lib/cdt/libcdt.la' >> plugin/quartz/Makefile
            make -j"$JOBS"
            make install
            # Confirm the built plugin set: libgvplugin_quartz present, no gd.
            ls -la "$PREFIX/lib/graphviz/" || true

          # Windows graphviz is installed + its gdiplus plugin patched in
          # dedicated steps before this one (see "Set up Graphviz on Windows"),
          # because the patched-plugin rebuild needs the MSVC toolchain.

          # --- Environment for pip build step ---
          CIBW_ENVIRONMENT_LINUX: >
            GRAPHVIZ_PREFIX=/opt/graphviz
            LD_LIBRARY_PATH=/opt/graphviz/lib:/opt/graphviz/lib/graphviz
            PATH="$PATH:/opt/graphviz/bin"
          CIBW_ENVIRONMENT_MACOS: >
            GRAPHVIZ_PREFIX=/opt/graphviz
            DYLD_LIBRARY_PATH=/opt/graphviz/lib:/opt/graphviz/lib/graphviz
            REPAIR_LIBRARY_PATH=/opt/graphviz/lib:/opt/graphviz/lib/graphviz
            MACOSX_DEPLOYMENT_TARGET=11.0
            PATH="$PATH:/opt/graphviz/bin"
          CIBW_ENVIRONMENT_WINDOWS: >
            GRAPHVIZ_PREFIX=C:\graphviz
            PATH="C:\graphviz\bin;$PATH"

          # --- Bundle CLI tools into the wheel ---
          CIBW_BEFORE_BUILD_LINUX: >
            mkdir -p {package}/pygraphviz/bin &&
            cp /opt/graphviz/bin/gc
            /opt/graphviz/bin/acyclic
            /opt/graphviz/bin/gvpr
            /opt/graphviz/bin/gvcolor
            /opt/graphviz/bin/ccomps
            /opt/graphviz/bin/sccmap
            /opt/graphviz/bin/tred
            /opt/graphviz/bin/unflatten
            {package}/pygraphviz/bin/
          CIBW_BEFORE_BUILD_MACOS: >
            mkdir -p {package}/pygraphviz/bin &&
            cp /opt/graphviz/bin/gc
            /opt/graphviz/bin/acyclic
            /opt/graphviz/bin/gvpr
            /opt/graphviz/bin/gvcolor
            /opt/graphviz/bin/ccomps
            /opt/graphviz/bin/sccmap
            /opt/graphviz/bin/tred
            /opt/graphviz/bin/unflatten
            {package}/pygraphviz/bin/
          CIBW_BEFORE_BUILD_WINDOWS: >
            mkdir {package}\pygraphviz\bin &
            copy C:\graphviz\bin\gc.exe {package}\pygraphviz\bin\ &
            copy C:\graphviz\bin\acyclic.exe {package}\pygraphviz\bin\ &
            copy C:\graphviz\bin\gvpr.exe {package}\pygraphviz\bin\ &
            copy C:\graphviz\bin\gvcolor.exe {package}\pygraphviz\bin\ &
            copy C:\graphviz\bin\ccomps.exe {package}\pygraphviz\bin\ &
            copy C:\graphviz\bin\sccmap.exe {package}\pygraphviz\bin\ &
            copy C:\graphviz\bin\tred.exe {package}\pygraphviz\bin\ &
            copy C:\graphviz\bin\unflatten.exe {package}\pygraphviz\bin\

          # --- Wheel repair (bundle shared libs into wheel) ---
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            DYLD_LIBRARY_PATH=$REPAIR_LIBRARY_PATH delocate-wheel
            --require-archs {delocate_archs} -w {dest_dir} -v {wheel}
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >
            pip install delvewheel &&
            delvewheel repair -w {dest_dir} {wheel}
            --add-path C:\graphviz\bin

          # --- Testing ---
          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: >
            python -c "import os, tempfile, pygraphviz as p; print('pygraphviz', p.__version__); G = p.AGraph(); G.add_edge('a', 'b'); f = os.path.join(tempfile.mkdtemp(), 't.png'); G.draw(f, prog='dot'); assert os.path.getsize(f) > 0; print('PNG render OK:', f)" &&
            pytest --pyargs pygraphviz

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

      # Render a sample image FROM THE BUILT WHEEL (installed on the host runner,
      # so it exercises the wheel's bundled libs + builtins -- the same code path
      # users get) and upload it for visual inspection. Done as a host step
      # rather than in CIBW_TEST_COMMAND because the Linux test runs in a
      # container whose filesystem (incl. any rendered file) is not copied back.
      - name: Render sample image from the built wheel
        shell: bash
        run: |
          python -m pip install --force-reinstall --no-index --find-links wheelhouse pygraphviz
          # Force the wheel to use ONLY its bundled builtin plugins -- the real
          # end-user scenario. The render step runs on the build runner, which
          # still has a system graphviz (C:\graphviz on Windows, /opt/graphviz on
          # macOS) that graphviz would otherwise demand-load, masking what the
          # wheel actually ships. GVBINDIR alone does NOT disable this on Windows,
          # so physically remove the system graphviz before rendering.
          if [ "$RUNNER_OS" = "Windows" ]; then rm -rf "/c/graphviz" || true; fi
          if [ "$RUNNER_OS" = "macOS" ]; then sudo rm -rf /opt/graphviz || true; fi
          export GVBINDIR="$PWD/__force_builtin_plugins__"
          mkdir -p rendered
          # Run from inside rendered/ so sys.path[0] is not the repo root (whose
          # ./pygraphviz source dir would shadow the installed wheel and lack the
          # compiled _graphviz extension).
          cd rendered
          OUT="foo-${{ matrix.os }}.png" python - <<'PY'
          import os
          import pygraphviz as pgv
          A = pgv.AGraph(directed=True, strict=True, rankdir="LR")
          A.add_node(1, color="red")
          A.add_node(5, color="blue")
          A.add_edge(1, 2, color="green")
          A.add_edge(2, 3)
          A.add_edge(1, 3)
          A.add_edge(3, 4)
          A.add_edge(3, 5)
          A.add_edge(3, 6)
          A.add_edge(4, 6)
          A.graph_attr["epsilon"] = "0.001"
          print(A.string())
          A.layout("dot")
          out = os.environ["OUT"]
          A.draw(out)
          print("wrote", out, os.path.getsize(out), "bytes")
          PY

      # Sample image(s) rendered by the built wheel, one per OS, for download +
      # visual inspection of each platform's native renderer output.
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: rendered-${{ matrix.os }}
          path: ./rendered/*.png
          if-no-files-found: warn

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # NOTE: Due to the version-checking mechanism for building pygraphviz,
      # graphviz (specifically, the `dot` CLI tool) *must* be available at
      # build time in order to build pygraphviz from source.
      - name: Install graphviz
        run: sudo apt install graphviz

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist

      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz

  show_artifacts:
    needs: [build_wheels, build_sdist]
    name: Show artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: "*"
          path: ${{ github.workspace }}/dist
          merge-multiple: true

      - run: ls -lh ${{ github.workspace }}/dist/

  pypi-publish:
    needs: [build_wheels, build_sdist]
    name: Publish wheels and sdist to PyPI
    # Only publish on a pygraphviz-* tag pushed to the canonical repo -- never on
    # PRs, branch pushes, or forks. Runs only if every wheel/sdist build succeeded.
    if: >
      github.repository_owner == 'pygraphviz' &&
      startsWith(github.ref, 'refs/tags/pygraphviz-')
    runs-on: ubuntu-latest
    # Specifying a GitHub environment is optional, but strongly encouraged
    environment: release
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write
    steps:
      # Pull the wheels (every matrix.os) and the sdist built earlier in this
      # same run; merge-multiple flattens them into a single dist/ for twine.
      - uses: actions/download-artifact@v8
        with:
          pattern: "*"
          path: dist
          merge-multiple: true

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
