name: Build Wheels and Release

on:
  push:
    branches: [main]
    tags: ["pygraphviz-*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GRAPHVIZ_VERSION: "12.2.1"

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15
          - macos-15-intel
          - windows-latest
          - ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux_*"

          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28

          # --- Build graphviz from source (autotools) on Linux/macOS ---
          # The release tarballs use autotools, not CMake.
          # --disable-swig --disable-tcl etc: skip language bindings we don't need
          # CFLAGS=-fPIC: needed for linking into a shared Python extension
          CIBW_BEFORE_ALL_LINUX: >
            dnf install -y gcc gcc-c++ bison flex expat-devel zlib-devel autoconf automake libtool gd-devel &&
            curl -L
            "https://gitlab.com/api/v4/projects/4207231/packages/generic/graphviz-releases/${{ env.GRAPHVIZ_VERSION }}/graphviz-${{ env.GRAPHVIZ_VERSION }}.tar.gz"
            -o /tmp/graphviz.tar.gz &&
            tar xzf /tmp/graphviz.tar.gz -C /tmp &&
            cd /tmp/graphviz-${{ env.GRAPHVIZ_VERSION }} &&
            ./configure
            --prefix=/opt/graphviz
            --with-pangocairo
            --disable-swig
            --disable-tcl
            --disable-sharp
            --disable-go
            --disable-guile
            --disable-java
            --disable-lua
            --disable-perl
            --disable-php
            --disable-python
            --disable-python3
            --disable-r
            --disable-ruby
            --disable-man-pdfs
            --with-expat
            --with-zlib
            CFLAGS="-fPIC" &&
            make -j$(nproc) &&
            make install &&
            ldconfig

          # macOS: build libgd and its image deps (libpng, freetype) AND
          # graphviz from source into GRAPHVIZ_PREFIX, instead of
          # `brew install gd`.
          #
          # WHY: Homebrew bottles are compiled for the runner's current macOS
          # (15), so delocate >= 0.11 refuses to bundle them into a wheel tagged
          # for an older macOS (our 11.0 floor). Building the bundled
          # libs from source makes them carry the wheel's deployment target.
          # Build *tools* (pkg-config, cmake) are already on the macos-15 runner,
          # so no `brew install` is needed; only the runtime libs are built. (In
          # any case tools are not bundled into the wheel, only runtime libs are.)
          #
          # libpng/freetype/gd are not Homebrew-installed on the runner, so a
          # prefix-first PKG_CONFIG_PATH is enough to find our builds. delocate
          # (>= 0.11) is the backstop: it fails the wheel if any bundled dylib
          # needs newer than 11.0. System libs (zlib, expat) come from the SDK
          # and are not bundled, so they are fine.
          #
          # BEFORE_ALL runs once per job (per arch), so these builds happen once,
          # not once per Python version. Dropped vs brew gd: jpeg, tiff, webp,
          # avif, heif, xpm and fontconfig (macOS resolves fonts from the system
          # font dirs). avif/heif are dropped deliberately to hold the 11.0 floor
          # (see the libgd configure note below).
          CIBW_BEFORE_ALL_MACOS: |
            set -eux

            export MACOSX_DEPLOYMENT_TARGET=11.0
            PREFIX=/opt/graphviz
            JOBS="$(sysctl -n hw.logicalcpu)"

            LIBPNG_VERSION=1.6.58
            FREETYPE_VERSION=2.13.3
            LIBGD_VERSION=2.3.3
            LIBTOOL_VERSION=2.5.4

            # Own the prefix so every `make install` works without sudo.
            sudo mkdir -p "$PREFIX"
            sudo chown -R "$(id -u):$(id -g)" "$PREFIX"

            # Find our freshly built libs first; pkg-config then supplies the
            # actual -I/-L flags from each package's .pc file.
            export PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig"
            export PATH="$PREFIX/bin:$PATH"

            # The macOS SDK ships zlib (libz + zlib.h) but no zlib.pc, while
            # libpng.pc declares "Requires.private: zlib". Without a zlib.pc,
            # pkg-config can't resolve libpng, so libgd silently turns off PNG.
            # Provide a zlib.pc pointing at the system zlib to close the chain.
            mkdir -p "$PREFIX/lib/pkgconfig"
            printf '%s\n' 'Name: zlib' 'Description: zlib (macOS system)' \
              'Version: 1.2.12' 'Libs: -lz' 'Cflags:' \
              > "$PREFIX/lib/pkgconfig/zlib.pc"

            dl() { curl -fSL --retry 3 --retry-delay 5 "$1" -o "$2"; }
            cd /tmp

            # libpng (PNG; links system zlib from the SDK). GitHub archive -- the
            # tag commits a generated ./configure, so no autogen is needed, and
            # it is more reliable in CI than the SourceForge mirror redirect.
            dl "https://github.com/pnggroup/libpng/archive/refs/tags/v${LIBPNG_VERSION}.tar.gz" libpng.tar.gz
            tar xf libpng.tar.gz
            ( cd "libpng-${LIBPNG_VERSION}" \
              && ./configure --prefix="$PREFIX" --disable-static \
              && make -j"$JOBS" && make install )

            # freetype (TrueType text; no harfbuzz/brotli to avoid the cycle)
            dl "https://download.savannah.gnu.org/releases/freetype/freetype-${FREETYPE_VERSION}.tar.xz" freetype.tar.xz
            tar xf freetype.tar.xz
            ( cd "freetype-${FREETYPE_VERSION}" \
              && ./configure --prefix="$PREFIX" --disable-static --without-harfbuzz --without-brotli \
              && make -j"$JOBS" && make install )

            # libgd (PNG/GIF + freetype text). autotools build ships gdlib.pc
            # that graphviz discovers via pkg-config. That PNG actually works is
            # verified by the wheel test rendering a real .png (CIBW_TEST_COMMAND).
            #
            # --without-avif/--without-heif: libgd 2.3.2+ declares these as
            # AC_ARG_WITH options defaulting to "auto", i.e. link them if found.
            # pkg-config still scans its built-in dirs (Homebrew's /usr/local)
            # even with PKG_CONFIG_PATH set, so on "auto" libgd links Homebrew's
            # libavif -> libdav1d/libaom/libvmaf (and libheif -> libde265/x265).
            # Those bottles target macOS 14.0, so delocate rejects them in an
            # 11.0 wheel. Disabling both keeps every bundled dylib at the 11.0
            # floor; we don't ship AVIF/HEIF output anyway.
            dl "https://github.com/libgd/libgd/releases/download/gd-${LIBGD_VERSION}/libgd-${LIBGD_VERSION}.tar.xz" libgd.tar.xz
            tar xf libgd.tar.xz
            ( cd "libgd-${LIBGD_VERSION}" \
              && ./configure --prefix="$PREFIX" --disable-static \
                   --without-jpeg --without-fontconfig --without-tiff --without-webp --without-xpm \
                   --without-avif --without-heif \
              && make -j"$JOBS" && make install )

            # libtool / libltdl (graphviz links libltdl for runtime plugin
            # loading). Same Homebrew-bottle problem as libgd: the runner's
            # libtool bottle (/usr/local/.../libltdl.7.dylib) targets the
            # current macOS (15), so delocate rejects it in an 11.0 wheel.
            # Build libltdl from source so the bundled copy carries the 11.0
            # floor, and point graphviz's configure at it below.
            dl "https://ftpmirror.gnu.org/libtool/libtool-${LIBTOOL_VERSION}.tar.gz" libtool.tar.gz
            tar xzf libtool.tar.gz
            ( cd "libtool-${LIBTOOL_VERSION}" \
              && ./configure --prefix="$PREFIX" --disable-static \
              && make -j"$JOBS" && make install )

            # graphviz (links the libgd and libltdl we just built). CPPFLAGS/
            # LDFLAGS steer ltdl detection to $PREFIX so graphviz links our
            # 11.0 libltdl instead of the Homebrew bottle on the runner.
            dl "https://gitlab.com/api/v4/projects/4207231/packages/generic/graphviz-releases/${{ env.GRAPHVIZ_VERSION }}/graphviz-${{ env.GRAPHVIZ_VERSION }}.tar.gz" graphviz.tar.gz
            tar xzf graphviz.tar.gz
            cd "graphviz-${{ env.GRAPHVIZ_VERSION }}"
            CPPFLAGS="-I$PREFIX/include" LDFLAGS="-L$PREFIX/lib" \
            ./configure \
              --prefix="$PREFIX" \
              --disable-swig --disable-tcl --disable-sharp --disable-go --disable-guile \
              --disable-java --disable-lua --disable-perl --disable-php \
              --disable-python --disable-python3 --disable-r --disable-ruby \
              --disable-man-pdfs --with-expat --with-zlib \
              --with-gdincludedir="$PREFIX/include" --with-gdlibdir="$PREFIX/lib"
            # Same gd-plugin link fix as before (static pathplan on macOS).
            echo 'libgvplugin_gd_la_LIBADD += ../../lib/pathplan/libpathplan_C.la' >> plugin/gd/Makefile
            make -j"$JOBS"
            make install

          # Windows: use the official graphviz installer to a simple path (no spaces).
          # Update the package_files URL when changing GRAPHVIZ_VERSION.
          CIBW_BEFORE_ALL_WINDOWS: >
            curl -L -o C:\Temp\graphviz.exe
            "https://gitlab.com/api/v4/projects/4207231/packages/generic/graphviz-releases/${{ env.GRAPHVIZ_VERSION }}/windows_10_cmake_Release_graphviz-install-${{ env.GRAPHVIZ_VERSION }}-win64.exe" &&
            C:\Temp\graphviz.exe /S /D=C:\graphviz

          # --- Environment for pip build step ---
          CIBW_ENVIRONMENT_LINUX: >
            GRAPHVIZ_PREFIX=/opt/graphviz
            LD_LIBRARY_PATH=/opt/graphviz/lib:/opt/graphviz/lib/graphviz
            PATH="$PATH:/opt/graphviz/bin"
          CIBW_ENVIRONMENT_MACOS: >
            GRAPHVIZ_PREFIX=/opt/graphviz
            DYLD_LIBRARY_PATH=/opt/graphviz/lib:/opt/graphviz/lib/graphviz
            REPAIR_LIBRARY_PATH=/opt/graphviz/lib:/opt/graphviz/lib/graphviz
            MACOSX_DEPLOYMENT_TARGET=11.0
            PATH="$PATH:/opt/graphviz/bin"
          CIBW_ENVIRONMENT_WINDOWS: >
            GRAPHVIZ_PREFIX=C:\graphviz
            PATH="C:\graphviz\bin;$PATH"

          # --- Bundle CLI tools into the wheel ---
          CIBW_BEFORE_BUILD_LINUX: >
            mkdir -p {package}/pygraphviz/bin &&
            cp /opt/graphviz/bin/gc
            /opt/graphviz/bin/acyclic
            /opt/graphviz/bin/gvpr
            /opt/graphviz/bin/gvcolor
            /opt/graphviz/bin/ccomps
            /opt/graphviz/bin/sccmap
            /opt/graphviz/bin/tred
            /opt/graphviz/bin/unflatten
            {package}/pygraphviz/bin/
          CIBW_BEFORE_BUILD_MACOS: >
            mkdir -p {package}/pygraphviz/bin &&
            cp /opt/graphviz/bin/gc
            /opt/graphviz/bin/acyclic
            /opt/graphviz/bin/gvpr
            /opt/graphviz/bin/gvcolor
            /opt/graphviz/bin/ccomps
            /opt/graphviz/bin/sccmap
            /opt/graphviz/bin/tred
            /opt/graphviz/bin/unflatten
            {package}/pygraphviz/bin/
          CIBW_BEFORE_BUILD_WINDOWS: >
            mkdir {package}\pygraphviz\bin &
            copy C:\graphviz\bin\gc.exe {package}\pygraphviz\bin\ &
            copy C:\graphviz\bin\acyclic.exe {package}\pygraphviz\bin\ &
            copy C:\graphviz\bin\gvpr.exe {package}\pygraphviz\bin\ &
            copy C:\graphviz\bin\gvcolor.exe {package}\pygraphviz\bin\ &
            copy C:\graphviz\bin\ccomps.exe {package}\pygraphviz\bin\ &
            copy C:\graphviz\bin\sccmap.exe {package}\pygraphviz\bin\ &
            copy C:\graphviz\bin\tred.exe {package}\pygraphviz\bin\ &
            copy C:\graphviz\bin\unflatten.exe {package}\pygraphviz\bin\

          # --- Wheel repair (bundle shared libs into wheel) ---
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            DYLD_LIBRARY_PATH=$REPAIR_LIBRARY_PATH delocate-wheel
            --require-archs {delocate_archs} -w {dest_dir} -v {wheel}
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >
            pip install delvewheel &&
            delvewheel repair -w {dest_dir} {wheel}
            --add-path C:\graphviz\bin

          # --- Testing ---
          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: >
            python -c "import pygraphviz as p, tempfile, os; print('pygraphviz', p.__version__); G = p.AGraph(); G.add_edge('a', 'b'); f = os.path.join(tempfile.mkdtemp(), 't.png'); G.draw(f, prog='dot'); assert os.path.getsize(f) > 0; print('PNG render OK:', f)" &&
            pytest --pyargs pygraphviz

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # NOTE: Due to the version-checking mechanism for building pygraphviz,
      # graphviz (specifically, the `dot` CLI tool) *must* be available at
      # build time in order to build pygraphviz from source.
      - name: Install graphviz
        run: sudo apt install graphviz

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist

      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz

  show_artifacts:
    needs: [build_wheels, build_sdist]
    name: Show artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: "*"
          path: ${{ github.workspace }}/dist
          merge-multiple: true

      - run: ls -lh ${{ github.workspace }}/dist/

  pypi-publish:
    needs: [build_wheels, build_sdist]
    name: Publish wheels and sdist to PyPI
    # Only publish on a pygraphviz-* tag pushed to the canonical repo -- never on
    # PRs, branch pushes, or forks. Runs only if every wheel/sdist build succeeded.
    if: >
      github.repository_owner == 'pygraphviz' &&
      startsWith(github.ref, 'refs/tags/pygraphviz-')
    runs-on: ubuntu-latest
    # Specifying a GitHub environment is optional, but strongly encouraged
    environment: release
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write
    steps:
      # Pull the wheels (every matrix.os) and the sdist built earlier in this
      # same run; merge-multiple flattens them into a single dist/ for twine.
      - uses: actions/download-artifact@v8
        with:
          pattern: "*"
          path: dist
          merge-multiple: true

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
